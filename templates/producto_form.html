{% extends "base.html" %}
{% block title %}{% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{% if producto %}Editar Producto #{{ producto.id_producto }}{% else %}Nuevo Producto{% endif %}</h1>
  <a href="{{ url_for('productos') }}" class="btn btn-secondary">← Volver</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="nombre">Nombre del producto *</label>
      <input type="text" id="nombre" name="nombre" required
             value="{{ producto.nombre if producto else '' }}" placeholder="Ej: Arroz 5kg"/>
    </div>
    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" rows="2"
                placeholder="Descripción breve del producto">{{ producto.descripcion if producto else '' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="precio_unitario">Precio unitario (Bs.) *</label>
        <input type="number" id="precio_unitario" name="precio_unitario"
               step="0.01" min="0" required
               value="{{ producto.precio_unitario if producto else '' }}"/>
      </div>
      <div class="form-group">
        <label for="stock_actual">Stock actual *</label>
        <input type="number" id="stock_actual" name="stock_actual"
               min="0" required
               value="{{ producto.stock_actual if producto else '' }}"/>
      </div>
    </div>
    <div class="form-group">
      <label for="categoria">Categoría</label>
      <select id="categoria" name="categoria">
        <option value="">-- Sin categoría --</option>
        {% for cat in ['Alimentos', 'Bebidas', 'Limpieza', 'Higiene', 'Electrónica', 'Ropa', 'Herramientas', 'Otros'] %}
        <option value="{{ cat }}" {% if producto and producto.categoria == cat %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {% if producto %}Guardar cambios{% else %}Crear producto{% endif %}
      </button>
      <a href="{{ url_for('productos') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
